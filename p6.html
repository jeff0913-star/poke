<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢語音圖鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .pokemon-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="container mx-auto px-4 py-10 flex flex-col items-center">
        <h1 class="text-4xl font-black text-red-600 mb-8 tracking-tighter uppercase">Pokédex Voice</h1>

        <div class="w-full max-w-md flex shadow-sm mb-10">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="輸入名稱或編號..." 
                class="flex-1 p-4 rounded-l-2xl border-y-2 border-l-2 border-gray-200 outline-none focus:border-red-500 transition-colors"
            >
            <button 
                onclick="searchPokemon()"
                class="bg-red-500 hover:bg-red-600 text-white px-8 rounded-r-2xl font-bold transition-colors"
            >
                搜尋
            </button>
        </div>

        <div id="statusMessage" class="hidden text-gray-500 font-medium mb-4 text-animate"></div>

        <div id="cardContainer" class="hidden w-full max-w-sm">
            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden pokemon-card border border-gray-100">
                <div id="cardHeader" class="p-10 flex justify-center relative">
                    <div class="absolute top-4 right-6 text-white/50 font-mono text-xl font-bold" id="pokedexId">#001</div>
                    <img id="pokemonImg" src="" alt="" class="w-48 h-48 z-10 drop-shadow-2xl">
                </div>

                <div class="p-8">
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <h2 id="pokemonName" class="text-3xl font-bold capitalize text-gray-800">Pokemon</h2>
                        <button onclick="speakCurrentPokemon()" class="bg-gray-100 hover:bg-gray-200 p-2 rounded-full transition-all active:scale-90" title="播放語音">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                    </div>
                    
                    <div id="typesContainer" class="flex justify-center gap-2 mb-8"></div>

                    <div class="grid grid-cols-2 gap-4 border-t border-gray-100 pt-6">
                        <div class="bg-gray-50 p-3 rounded-2xl text-center">
                            <p class="text-gray-400 text-xs uppercase font-bold">身高</p>
                            <p id="height" class="text-gray-700 font-bold text-lg">0.0 m</p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-2xl text-center">
                            <p class="text-gray-400 text-xs uppercase font-bold">體重</p>
                            <p id="weight" class="text-gray-700 font-bold text-lg">0.0 kg</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const typeColors = {
            fire: '#ef4444', water: '#3b82f6', grass: '#10b981', electric: '#facc15',
            psychic: '#ec4899', ice: '#67e8f9', dragon: '#6366f1', ghost: '#8b5cf6',
            ground: '#d97706', rock: '#78350f', poison: '#a855f7', bug: '#84cc16',
            fighting: '#dc2626', normal: '#9ca3af', fairy: '#f472b6'
        };

        let currentPokemonData = null;

        async function searchPokemon() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const card = document.getElementById('cardContainer');
            const status = document.getElementById('statusMessage');

            if (!input) return;

            status.innerText = "搜尋中...";
            status.classList.remove('hidden');
            card.classList.add('hidden');
            window.speechSynthesis.cancel(); // 停止之前的語音

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${input}`);
                if (!response.ok) throw new Error('找不到該寶可夢！');
                
                const data = await response.json();
                currentPokemonData = data;
                renderCard(data);
                
                status.classList.add('hidden');
                card.classList.remove('hidden');

                // 搜尋成功後自動朗讀
                speakCurrentPokemon();
            } catch (error) {
                status.innerText = error.message;
                status.classList.remove('hidden');
            }
        }

        function renderCard(data) {
            document.getElementById('pokemonName').innerText = data.name;
            document.getElementById('pokedexId').innerText = `#${data.id.toString().padStart(3, '0')}`;
            document.getElementById('pokemonImg').src = data.sprites.other['official-artwork'].front_default;
            document.getElementById('height').innerText = `${data.height / 10} m`;
            document.getElementById('weight').innerText = `${data.weight / 10} kg`;

            const typesContainer = document.getElementById('typesContainer');
            typesContainer.innerHTML = '';
            data.types.forEach(t => {
                const span = document.createElement('span');
                span.innerText = t.type.name;
                span.className = 'px-4 py-1 rounded-full text-white text-xs font-bold uppercase';
                span.style.backgroundColor = typeColors[t.type.name] || '#9ca3af';
                typesContainer.appendChild(span);
            });

            const mainColor = typeColors[data.types[0].type.name] || '#9ca3af';
            document.getElementById('cardHeader').style.backgroundColor = mainColor;
        }

        // --- TTS 核心功能 ---
        function speakCurrentPokemon() {
            if (!currentPokemonData) return;

            const name = currentPokemonData.name;
            const types = currentPokemonData.types.map(t => t.type.name).join('和');
            const height = currentPokemonData.height / 10;
            const weight = currentPokemonData.weight / 10;

            // 組合朗讀文本
            const text = `${name}。屬性是：${types}。身高${height}公尺，體重${weight}公斤。`;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; // 設定語言為繁體中文
            utterance.rate = 1.0;     // 語速
            utterance.pitch = 1.1;    // 音調 (稍微高一點聽起來比較像機器人助手)

            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPokemon();
        });
    </script>
</body>
</html>
